{% load static %}
<html lang="en">
<head>
    <title>Kioskbear</title>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chartist@1.3.0/dist/index.umd.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/chartist@1.3.0/dist/index.min.css" rel="stylesheet">
    <link href="{% static 'leader-line/leader-line.min.js' %}" rel="stylesheet">
    <link href="{% static 'dist/css/app.css' %}" rel="stylesheet">

</head>
<body class="bg-lightest">
<div class="drawer lg:drawer-open">
    <input id="my-drawer-2" type="checkbox" class="drawer-toggle"/>
    <div class="flex flex-col items-center p-4 drawer-content">
        <label for="my-drawer-2" class="btn btn-primary drawer-button lg:hidden">Open drawer</label>
        {% block content %}{% endblock %}
    </div>
    <div class="drawer-side">
        <label for="my-drawer-2" class="drawer-overlay"></label>
        <div class="flex h-full bg-brand">
            <div class="flex flex-1 flex-col justify-between">
                <div class="p-4">
                    <div class="p-4 px-8">
                        <span class="text-2xl font-bold text-white "><a href="{% url 'app:dashboard' %}">Kioskbear</a></span>
                    </div>
                    <div>
                        <ul class="w-80 p-4 menu text-base-content">
                            <li class="text-white ">
                                <a href="{% url 'app:dashboard' %}" class="hover:text-white">Dashboard</a>
                            </li>
                            <li class="text-white ">
                                <a class="hover:text-white">Analytics</a>
                            </li>
                            <li class="text-white">
                                <a href="{% url 'app:survey-builder' %}" class="hover:text-white">Survey Builder</a>
                            </li>
                            <li class="text-white">
                                <a href="{% url 'app:survey-builder' %}" class="hover:text-white">Design</a>
                            </li>
                            <li class="text-white"><a class="hover:text-white">Devices</a></li>
                        </ul>
                    </div>
                </div>
                <div class="p-4 px-8  text-white">
                    <div class="text-lg font-bold">
                        {{ request.user.customer.organisation_name }}
                    </div>
                    <div>
                        <form method="post" action="{% url 'accounts:signout' %}">
                            {% csrf_token %}
                            <button type="submit">Sign out</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

    {% block extrajs %}{% endblock %}
</body>
</html>

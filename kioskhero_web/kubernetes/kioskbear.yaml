apiVersion: apps/v1
kind: Deployment
metadata:
  name: kioskbear
spec:
  selector:
    matchLabels:
      app: kioskbear
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kioskbear
    spec:
      imagePullSecrets:
        - name: gcp-artifact-registry
      containers:
        - name: django
          image: europe-west1-docker.pkg.dev/roiiogcloud/kioskbear/kioskbear:latest
          imagePullPolicy: Always
          ports:
            - name: gunicorn
              containerPort: 8200
          resources:
            requests:
              cpu: "300m"
              memory: "200Mi"
            limits:
              cpu: "400m"
              memory: 500Mi
          env:
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: kioskbear-db-secret
                  key: user
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kioskbear-db-secret
                  key: password
            - name: DJANGO_CACHE_PREFIX
              value: "kioskbear"
            - name: DJANGO_SETTINGS_MODULE
              value: "kioskbear.conf.settings.production"
            - name: GUNICORN_CMD_ARGS
              value: "--bind=:8200 --workers=1 --threads 5 --keep-alive 65 --max-requests=100000 --timeout=120 --error-logfile=/app/error.log --worker-tmp-dir=/dev/shm --preload"
            - name: PYTHONIOENCODING
              value: "UTF-8"
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: kioskbear
  name: kioskbear
spec:
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 8200
      targetPort: 8200
      name: kioskbear
  selector:
    app: kioskbear

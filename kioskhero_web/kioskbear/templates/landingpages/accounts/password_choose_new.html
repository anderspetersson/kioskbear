{% extends 'landingpages/accounts/base_landingpages_accounts.html' %}
{% load static %}

{% block content %}
    <div class="flex h-full">
        <div class="flex flex-1 flex-col justify-between">
            <div class="mx-auto w-full min-w-min max-w-lg text-left mt-56">
                <div class="py-8 text-7xl font-bold">Recover your password</div>
                <form action="." method="post">{% csrf_token %}
                    {{ form.errors }}
                    <label class="my-6 block">
                        <span class="mb-2 block text-gray-700">New password</span>
                        {{ form.new_password1 }}
                    </label>
                    <label class="my-6 block">
                        <span class="mb-2 block text-gray-700">Confirm password</span>
                        {{ form.new_password2 }}
                    </label>
                    <input type="submit" value="Reset my password"
                           class="my-6 block w-min p-4 bg-dark text-lightest hover:bg-darkest">
                </form>
            </div>
            <div class="mx-auto w-full min-w-min max-w-lg py-8 text-left">
                Go back to <a href="{% url 'accounts:signin' %}" class="font-bold">Sign in page</a>
            </div>
        </div>

        <div class="flex w-full flex-1 bg-brand">

        </div>
    </div>
{% endblock %}
